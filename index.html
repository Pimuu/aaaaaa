<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Letter For You 💌</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.white-bg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    /* Letter gif */
    .letter-img {
      width: min(260px, 68vw);
      animation: float 3.5s ease-in-out infinite;
      display: block;
    }

    /* Shrinking button */
    #open-btn {
      transition: font-size .3s ease, padding .3s ease, opacity .4s ease;
      transform-origin: center;
    }

    /* Hint */
    #hint {
      font-family: 'Lato', sans-serif;
      font-size: .85rem;
      color: #c090a0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease;
    }
    #hint.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #hint a {
      color: var(--pink-dark);
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body class="white-bg">

  <div class="center">
    <!-- Letter gif — add letter.gif to your repo root -->
    <img class="letter-img fade-up" src="letter.gif" alt="a letter for you" />

    <!-- Shrinking button -->
    <button class="btn fade-up-d1" id="open-btn">Open Me 💌</button>

    <!-- Hint -->
    <p id="hint" class="fade-up-d2">
      Can't click the button? <a href="quiz.html">Maybe try this instead.</a>
    </p>
  </div>

  <script>
    const btn  = document.getElementById('open-btn');
    const hint = document.getElementById('hint');

    let clicks    = 0;
    const HINT_AT = 7;
    const MAX     = 10;

    btn.addEventListener('click', () => {
      clicks++;

      if (clicks >= MAX) {
        btn.style.opacity      = '0';
        btn.style.pointerEvents = 'none';
        hint.classList.add('visible');
        return;
      }

      // shrink 14% per click
      const f    = Math.pow(0.86, clicks);
      btn.style.fontSize = (1.2 * f) + 'rem';
      btn.style.padding  = (0.6 * f) + 'em ' + (2 * f) + 'em';

      if (clicks >= HINT_AT) hint.classList.add('visible');
    });
  </script>
</body>
</html>
