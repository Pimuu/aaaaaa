<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Letter For You 💌</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.white-bg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    /* Letter gif */
    .letter-img {
      width: min(260px, 68vw);
      animation: float 3.5s ease-in-out infinite;
      display: block;
    }

    /* Shrinking button */
    #open-btn {
      transition: transform .3s ease, opacity .4s ease;
      transform-origin: center;
      display: inline-block;
    }

    /* Hint — hidden until JS adds .visible */
    #hint {
      font-family: 'Lato', sans-serif;
      font-size: .85rem;
      color: #c090a0;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease;
    }
    #hint.visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }
    #hint a {
      color: var(--pink-dark);
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body class="white-bg">

  <div class="center">
    <!-- Letter gif — add letter.gif to your repo root -->
    <img class="letter-img fade-up" src="letter.gif" alt="a letter for you" />

    <!-- Shrinking button -->
    <button class="btn fade-up-d1" id="open-btn">Open Me 💌</button>

    <!-- Hint -->
    <p id="hint" class="fade-up-d2">
      Can't click the button? <a href="quiz.html">Maybe try this instead.</a>
    </p>
  </div>

  <script>
    const btn  = document.getElementById('open-btn');
    const hint = document.getElementById('hint');

    let clicks    = 0;
    const HINT_AT = 5;   // hint appears after this many clicks
    const MAX     = 8;   // button fully disappears after this many clicks

    btn.addEventListener('click', () => {
      clicks++;

      // Shrink by 20% each click using scale — button stays clickable throughout
      const scale = Math.pow(0.80, clicks);
      btn.style.transform = `scale(${scale})`;

      // Show hint after HINT_AT clicks
      if (clicks >= HINT_AT) {
        hint.classList.add('visible');
      }

      // Hide button completely after MAX clicks
      if (clicks >= MAX) {
        btn.style.opacity       = '0';
        btn.style.pointerEvents = 'none';
        setTimeout(() => { btn.style.display = 'none'; }, 400);
      }
    });
  </script>
</body>
</html>
